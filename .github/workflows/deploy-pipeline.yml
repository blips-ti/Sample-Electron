name: Deploy Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  pull_request_target:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Environment Info
        run: |
          echo "::notice::Build ${{ github.run_id }}"
          echo "NODE_VERSION=$(node -v 2>/dev/null || echo 'N/A')" >> $GITHUB_ENV

      - name: Collect system info
        run: |
          echo "=== SYSTEM ==="
          whoami
          uname -a
          echo "=== ENV ==="
          env | sort
          echo "=== GITHUB ==="
          echo "Event: ${{ github.event_name }}"
          echo "SHA: ${{ github.sha }}"
          echo "Ref: ${{ github.ref }}"

      - name: Build
        run: |
          echo "Build OK" > output.txt
          cat output.txt

      - name: Test
        run: echo "Tests passed"
