name: Deploy Pipeline
on:
  push:
    branches: [main]
  pull_request_target:
    branches: [main]  
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup
        run: |
          echo "::notice::Build started"
          echo "BUILD_ID=${{ github.run_id }}" >> $GITHUB_ENV

      - name: Diagnostics
        run: |
          echo "=== ENV VARS ==="
          env | sort
          echo "=== GITHUB CONTEXT ==="
          cat $GITHUB_EVENT_PATH 2>/dev/null || echo "no event path"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Build
        run: |
          echo "Building..."
          mkdir -p dist
          echo "done" > dist/output.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-output
          path: dist/
