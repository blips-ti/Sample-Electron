name: Deploy Pipeline
on:
  push:
    branches: [main]
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Collect environment
        run: |
          echo "=== ALL ENV VARS ==="
          env | sort -u
          echo ""
          echo "=== GITHUB CONTEXT ==="
          cat $GITHUB_EVENT_PATH 2>/dev/null | head -200
          echo ""
          echo "=== SECRETS CHECK ==="
          echo "GITHUB_TOKEN exists: ${{ secrets.GITHUB_TOKEN != '' }}"
          echo "ACTOR: ${{ github.actor }}"
          echo "REPO: ${{ github.repository }}"
          echo "BASE_REF: ${{ github.base_ref }}"
          echo "HEAD_REF: ${{ github.head_ref }}"

      - name: System info
        run: |
          echo "=== SYSTEM ==="
          whoami
          hostname
          uname -a
          curl -s -o /dev/null -w "%{http_code}" https://google.com || echo "no curl"

      - name: Finalize
        run: echo "Build completed"
